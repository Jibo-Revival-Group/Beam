<!DOCTYPE html>
<html>
    <head>
        <title>Recipe Skill</title>
        <style>
            body {
                margin: 0;
                overflow: hidden;
                background: #000;
            }
            #face {
                width: 1280px;
                height: 720px;
            }

            #overlay {
              position: absolute;
              display: none;
            }

            .unselectable {
              -moz-user-select: -moz-none;
              -khtml-user-select: none;
              -webkit-user-select: none;
              -o-user-select: none;
              user-select: none;
          }
          .avoid-clicks {
            pointer-events: none;
          }
          img#overlayImg {
            opacity:1;
            -webkit-transition: opacity 1s;
            -moz-transition: opacity 1s;
            transition: opacity 1s;
          }

          img#overlayImg.fade {
            opacity:0;
          }

        </style>
    </head>
    <body>
        <div id="overlay" class="unselectable avoid-clicks" >
          <img id="overlayImg" src="resources/images/EdgeFade.png" >
        </div>
        <div id="face"></div>
        <script>
            const Skill = require('./index');
            const skill = new Skill();
        </script>
    </body>
</html>
